<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Totally Normal Ludo</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4_U6rYuOD7l0jmAPoGNdVp5W3pEitaHQ",
            authDomain: "ludo-prank-433ae.firebaseapp.com",
            projectId: "ludo-prank-433ae",
            storageBucket: "ludo-prank-433ae.firebasestorage.app",
            messagingSenderId: "435400145400",
            appId: "1:435400145400:web:7d2ce57b9de74c06d87e0d",
            databaseURL: "https://ludo-prank-433ae-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.database = getDatabase(app);
        window.diceRef = ref(window.database, 'prank/next_roll');
        window.firebaseSet = set; 

        window.secretNextRoll = 'random';
        onValue(window.diceRef, (snapshot) => {
            let value = snapshot.val();
            if (value) { window.secretNextRoll = value; }
        });
    </script>

    <style>
        :root {
            /* Matched exactly to the punchy colors in your reference */
            --red: #E6222B; 
            --green: #249A41; 
            --blue: #1A75D5; 
            --yellow: #F3C300;
            --bg: #2C3E50; /* A nice dark blue/gray for the background */
            --board-size: min(95vw, 500px); 
            --cell-size: calc(var(--board-size) / 15);
        }

        body { margin: 0; background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: manipulation; }

        .game-wrapper { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; position: relative; }

        /* --- THE BOARD --- */
        .board { width: var(--board-size); height: var(--board-size); background: white; border: 2px solid #111; display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); box-shadow: 0 10px 30px rgba(0,0,0,0.6); position: relative; }
        .cell { border: 1px solid #c9c9c9; box-sizing: border-box; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; position: relative; background: white; }
        
        /* Vibrant Colors for the path */
        .bg-red { background-color: var(--red); } 
        .bg-green { background-color: var(--green); }
        .bg-blue { background-color: var(--blue); } 
        .bg-yellow { background-color: var(--yellow); }

        /* --- PLAYER BASES --- */
        .base { grid-column: span 6; grid-row: span 6; padding: 12%; display: flex; justify-content: center; align-items: center; border: 1px solid #111; }
        .base-inner { width: 100%; height: 100%; background: white; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20%; padding: 20%; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        /* The exact look of the token resting spots in your picture */
        .base-spot { background: #E0E0E0; border-radius: 50%; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2), 0 1px 1px white; display: flex; justify-content: center; align-items: center; position: relative; }

        /* --- CENTER HOME --- */
        .center-home { grid-area: 7 / 7 / 10 / 10; position: relative; border: 1px solid #111; background: white; }
        .center-home div { position: absolute; width: 0; height: 0; border-style: solid; }
        .ct-green { border-width: calc(var(--cell-size) * 1.5) 0 calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5); border-color: transparent transparent transparent var(--green); left: 0; top: 0; }
        .ct-yellow { border-width: calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5) 0 calc(var(--cell-size) * 1.5); border-color: var(--yellow) transparent transparent transparent; top: 0; right: 0; }
        .ct-blue { border-width: calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5) 0; border-color: transparent var(--blue) transparent transparent; right: 0; bottom: 0; }
        .ct-red { border-width: 0 calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5) calc(var(--cell-size) * 1.5); border-color: transparent transparent var(--red) transparent; left: 0; bottom: 0; }

        /* --- ICONS (Stars & Arrows) --- */
        /* Outlined stars instead of solid stars */
        .safe-star::before { content: '☆'; position: absolute; font-size: calc(var(--cell-size) * 0.8); color: rgba(0,0,0,0.6); pointer-events: none; }
        /* Subtler arrows */
        .start-arrow::after { content: '➔'; position: absolute; font-size: calc(var(--cell-size) * 0.6); color: rgba(255,255,255,0.9); pointer-events: none; }
        .arrow-right::after { transform: rotate(0deg); } .arrow-down::after { transform: rotate(90deg); }
        .arrow-left::after { transform: rotate(180deg); } .arrow-up::after { transform: rotate(-90deg); }

        /* --- 3D PLASTIC TOKENS --- */
        /* Changed from a flat diamond to a 3D looking round pawn */
        .token { 
            width: 75%; height: 75%; 
            border-radius: 50%; 
            position: relative; z-index: 10; cursor: pointer; transition: 0.2s; 
            display: flex; justify-content: center; align-items: center; 
            /* Drop shadow onto the board */
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset -2px -4px 6px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.2);
        }
        /* The top reflection of the plastic pawn */
        .token::after { 
            content: ''; width: 40%; height: 40%; 
            background: rgba(255,255,255,0.7); 
            border-radius: 50%; position: absolute; 
            top: 15%; left: 15%; 
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        /* Radial gradients give the 3D spherical look */
        .t-red { background: radial-gradient(circle at 30% 30%, #ff5252, var(--red)); } 
        .t-green { background: radial-gradient(circle at 30% 30%, #4ae36b, var(--green)); }
        .t-blue { background: radial-gradient(circle at 30% 30%, #4da5ff, var(--blue)); } 
        .t-yellow { background: radial-gradient(circle at 30% 30%, #ffe45c, var(--yellow)); }
        
        @keyframes pulse-token { 0% { transform: scale(1); box-shadow: 0 4px 6px rgba(0,0,0,0.5); } 50% { transform: scale(1.15) translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.6), 0 0 10px white; } 100% { transform: scale(1); box-shadow: 0 4px 6px rgba(0,0,0,0.5); } }
        .token.movable { animation: pulse-token 1s infinite; z-index: 20; border: 2px solid white; }

        /* --- MOBILE UI PANELS --- */
        .panel-row { display: flex; justify-content: space-between; width: var(--board-size); }
        .player-panel { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; width: 35%; opacity: 0.5; transition: 0.3s; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border: 2px solid transparent; }
        
        /* Turn Highlights */
        .player-panel.active { opacity: 1; transform: scale(1.05); background: rgba(0,0,0,0.7); }
        #panel-green.active { border-color: var(--green); box-shadow: 0 0 15px var(--green); } 
        #panel-yellow.active { border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow); }
        #panel-red.active { border-color: var(--red); box-shadow: 0 0 15px var(--red); } 
        #panel-blue.active { border-color: var(--blue); box-shadow: 0 0 15px var(--blue); }

        .player-panel h3 { margin: 0; font-size: calc(var(--board-size) * 0.035); text-transform: uppercase; text-align: left; line-height: 1.2; width: 50%; color: white;}

        /* --- STEALTH DICE --- */
        .dice { 
            width: calc(var(--board-size) * 0.12); height: calc(var(--board-size) * 0.12); 
            background: white; border-radius: 8px; 
            display: grid; grid-template-areas: "a . c" "e g f" "d . b"; 
            padding: 4px; gap: 2px; box-sizing: border-box; cursor: pointer; 
            box-shadow: inset 0 -4px 0 #ddd, 0 4px 6px rgba(0,0,0,0.5);
            visibility: hidden; opacity: 0; transition: opacity 0.3s; border: 1px solid #ccc;
        }

        .dice.visible { visibility: visible; opacity: 1; }
        .dot { background: #222; border-radius: 50%; width: 100%; height: 100%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.8); }

        @keyframes dice-glow { 0% { transform: scale(1); } 50% { transform: scale(1.15); box-shadow: 0 0 20px white; } 100% { transform: scale(1); } }
        .ready-to-roll { animation: dice-glow 1s infinite; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="panel-row">
            <div class="player-panel" id="panel-green">
                <h3>Bot<br>(Green)</h3>
                <div class="dice" id="dice-green" onclick="handleDiceClick('green')"></div>
            </div>
            <div class="player-panel" id="panel-yellow">
                <h3>Bot<br>(Yellow)</h3>
                <div class="dice" id="dice-yellow" onclick="handleDiceClick('yellow')"></div>
            </div>
        </div>

        <div class="board" id="board"></div>

        <div class="panel-row">
            <div class="player-panel active" id="panel-red">
                <h3>You<br>(Red)</h3>
                <div class="dice visible ready-to-roll" id="dice-red" onclick="handleDiceClick('red')"></div>
            </div>
            <div class="player-panel" id="panel-blue">
                <h3>Bot<br>(Blue)</h3>
                <div class="dice" id="dice-blue" onclick="handleDiceClick('blue')"></div>
            </div>
        </div>
    </div>

<script>
    const colors = ['red', 'green', 'yellow', 'blue'];
    
    const mainPath = [
        {x:1,y:6},{x:2,y:6},{x:3,y:6},{x:4,y:6},{x:5,y:6}, 
        {x:6,y:5},{x:6,y:4},{x:6,y:3},{x:6,y:2},{x:6,y:1},{x:6,y:0}, 
        {x:7,y:0},{x:8,y:0}, 
        {x:8,y:1},{x:8,y:2},{x:8,y:3},{x:8,y:4},{x:8,y:5}, 
        {x:9,y:6},{x:10,y:6},{x:11,y:6},{x:12,y:6},{x:13,y:6},{x:14,y:6}, 
        {x:14,y:7},{x:14,y:8}, 
        {x:13,y:8},{x:12,y:8},{x:11,y:8},{x:10,y:8},{x:9,y:8}, 
        {x:8,y:9},{x:8,y:10},{x:8,y:11},{x:8,y:12},{x:8,y:13},{x:8,y:14}, 
        {x:7,y:14},{x:6,y:14}, 
        {x:6,y:13},{x:6,y:12},{x:6,y:11},{x:6,y:10},{x:6,y:9}, 
        {x:5,y:8},{x:4,y:8},{x:3,y:8},{x:2,y:8},{x:1,y:8},{x:0,y:8}, 
        {x:0,y:7},{x:0,y:6} 
    ];

    const homePaths = {
        green: [{x:1,y:7},{x:2,y:7},{x:3,y:7},{x:4,y:7},{x:5,y:7},{x:6,y:7}],
        yellow: [{x:7,y:1},{x:7,y:2},{x:7,y:3},{x:7,y:4},{x:7,y:5},{x:7,y:6}],
        blue: [{x:13,y:7},{x:12,y:7},{x:11,y:7},{x:10,y:7},{x:9,y:7},{x:8,y:7}],
        red: [{x:7,y:13},{x:7,y:12},{x:7,y:11},{x:7,y:10},{x:7,y:9},{x:7,y:8}]
    };

    const startOffsets = { green: 0, yellow: 13, blue: 26, red: 39 };
    const safeZones = [ {x:1,y:6}, {x:2,y:8}, {x:8,y:1}, {x:6,y:2}, {x:13,y:8}, {x:12,y:6}, {x:6,y:13}, {x:8,y:12} ];

    let gameState = {
        turnIndex: 0,
        currentRoll: 0,
        hasRolled: false,
        tokens: []
    };

    // --- SOUND MANAGER ---
    const sounds = {
        dice: new Audio('sounds/dice.mp3'),
        move: new Audio('sounds/move.mp3'),
        capture: new Audio('sounds/capture.mp3'),
        finish: new Audio('sounds/finish.mp3')
    };

    function playSound(type) {
        if (sounds[type]) {
            // Clone the sound so rapid steps don't lag or cut each other off
            let soundClone = sounds[type].cloneNode();
            soundClone.play().catch(e => console.log("Audio blocked by browser:", e));
        }
    }

    function initGame() {
        const board = document.getElementById('board');
        let html = '';

        for (let y = 0; y < 15; y++) {
            for (let x = 0; x < 15; x++) {
                if (y === 0 && x === 0) { html += createBase('green'); continue; }
                if (y === 0 && x === 9) { html += createBase('yellow'); continue; }
                if (y === 9 && x === 0) { html += createBase('red'); continue; }
                if (y === 9 && x === 9) { html += createBase('blue'); continue; }
                if ((y < 6 && x < 6) || (y < 6 && x > 8) || (y > 8 && x < 6) || (y > 8 && x > 8)) continue;

                if (x >= 6 && x <= 8 && y >= 6 && y <= 8) {
                    if (x === 6 && y === 6) html += `<div class="center-home"><div class="ct-green"></div><div class="ct-yellow"></div><div class="ct-red"></div><div class="ct-blue"></div></div>`;
                    continue;
                }

                let classes = 'cell';
                if (y === 7 && x >= 1 && x <= 5) classes += ' bg-green';
                if (x === 7 && y >= 1 && y <= 5) classes += ' bg-yellow';
                if (x === 7 && y >= 9 && y <= 13) classes += ' bg-red';
                if (y === 7 && x >= 9 && x <= 13) classes += ' bg-blue';

                if (y === 6 && x === 1) classes += ' bg-green start-arrow arrow-right';
                if (y === 1 && x === 8) classes += ' bg-yellow start-arrow arrow-down';
                if (y === 13 && x === 6) classes += ' bg-red start-arrow arrow-up';
                if (y === 8 && x === 13) classes += ' bg-blue start-arrow arrow-left';
                if (safeZones.some(s => s.x === x && s.y === y)) classes += ' safe-star';

                html += `<div class="${classes}" id="cell-${x}-${y}"></div>`;
            }
        }
        board.innerHTML = html;
        createTokens();
        renderDice('red', 6); renderDice('green', 6); renderDice('yellow', 6); renderDice('blue', 6);
    }

    function createBase(color) {
        return `<div class="base bg-${color}"><div class="base-inner">
            <div class="base-spot" id="base-${color}-0"></div><div class="base-spot" id="base-${color}-1"></div>
            <div class="base-spot" id="base-${color}-2"></div><div class="base-spot" id="base-${color}-3"></div>
        </div></div>`;
    }

    function createTokens() {
        colors.forEach(color => {
            for (let i = 0; i < 4; i++) {
                let tokenObj = { id: `${color}-${i}`, color: color, state: 'home', trackPos: -1 };
                gameState.tokens.push(tokenObj);

                let dom = document.createElement('div');
                dom.className = `token t-${color}`;
                dom.id = `dom-${tokenObj.id}`;
                dom.onclick = () => handleTokenClick(tokenObj.id);
                document.getElementById(`base-${color}-${i}`).appendChild(dom);
            }
        });
    }

    function handleDiceClick(colorClicked) {
        let currentTurnColor = colors[gameState.turnIndex];
        if (colorClicked !== currentTurnColor || gameState.hasRolled) return;

        document.getElementById(`dice-${currentTurnColor}`).classList.remove('ready-to-roll');

        if(window.secretNextRoll !== 'random') {
            gameState.currentRoll = parseInt(window.secretNextRoll);
            window.firebaseSet(window.diceRef, 'random'); 
        } else {
            gameState.currentRoll = Math.floor(Math.random() * 6) + 1;
        }

        gameState.hasRolled = true;
        playSound('dice');
        renderDice(currentTurnColor, gameState.currentRoll);

        let movableTokens = getMovableTokens(currentTurnColor, gameState.currentRoll);
        
        if (movableTokens.length === 0) {
            setTimeout(nextTurn, 1000);
        } else {
            movableTokens.forEach(t => document.getElementById(`dom-${t.id}`).classList.add('movable'));
        }
    }

    function renderDice(color, num) {
        const layouts = {
            1: ['g'], 2: ['a','b'], 3: ['a','g','b'], 
            4: ['a','c','d','b'], 5: ['a','c','g','d','b'], 6: ['a','c','e','f','d','b']
        };
        let html = '';
        layouts[num].forEach(pos => { html += `<div class="dot" style="grid-area: ${pos}"></div>`; });
        document.getElementById(`dice-${color}`).innerHTML = html;
    }

    function getMovableTokens(color, roll) {
        return gameState.tokens.filter(t => {
            if (t.color !== color) return false;
            if (t.state === 'finished') return false;
            if (t.state === 'home' && roll !== 6) return false;
            if (t.state === 'homeTrack' && t.trackPos + roll > 5) return false;
            return true;
        });
    }

    // --- NEW MOVEMENT ANIMATION ---
    function handleTokenClick(tokenId) {
        let token = gameState.tokens.find(t => t.id === tokenId);
        let currentTurnColor = colors[gameState.turnIndex];

        if (token.color !== currentTurnColor || !gameState.hasRolled) return;
        
        let domToken = document.getElementById(`dom-${token.id}`);
        if (!domToken.classList.contains('movable')) return;

        gameState.tokens.forEach(t => document.getElementById(`dom-${t.id}`).classList.remove('movable'));

        if (token.state === 'home' && gameState.currentRoll === 6) {
            token.state = 'main';
            token.trackPos = startOffsets[token.color];
            playSound('move');
            moveTokenToDOM(token); 
            finalizeMove(token, currentTurnColor);
        } else {
            walkToken(token, gameState.currentRoll, currentTurnColor);
        }
    }

    function walkToken(token, stepsLeft, currentTurnColor) {
        if (stepsLeft === 0) {
            finalizeMove(token, currentTurnColor);
            return;
        }

        if (token.state === 'main') {
            let relativeTravel = calculateRelativeDistance(token);
            if (relativeTravel + 1 > 50) {
                token.state = 'homeTrack';
                token.trackPos = 0; 
            } else {
                token.trackPos = (token.trackPos + 1) % 52;
            }
        } else if (token.state === 'homeTrack') {
            token.trackPos += 1;
        }

        // Physically move the token
        moveTokenToDOM(token);
        
        // Play the instant clone sound exactly as it moves
        playSound('move');

        // Changed from 300 to 200 for a snappier, less laggy walk
        setTimeout(() => {
            walkToken(token, stepsLeft - 1, currentTurnColor);
        }, 200); 
    }

    function finalizeMove(token, currentTurnColor) {
        if (token.state === 'homeTrack' && token.trackPos === 5) {
            token.state = 'finished';
            playSound('finish');
            gameState.hasRolled = false; 
            document.getElementById(`dice-${currentTurnColor}`).classList.add('ready-to-roll');
            return;
        }

        checkCapture(token);

        if (gameState.currentRoll === 6 || gameState.bonusRoll) {
            gameState.hasRolled = false;
            gameState.bonusRoll = false;
            document.getElementById(`dice-${currentTurnColor}`).classList.add('ready-to-roll');
        } else {
            setTimeout(nextTurn, 500);
        }
    }

    function calculateRelativeDistance(token) {
        let start = startOffsets[token.color];
        if (token.trackPos >= start) return token.trackPos - start;
        return (52 - start) + token.trackPos;
    }

    function moveTokenToDOM(token) {
        let targetId = '';
        if (token.state === 'main') {
            let coord = mainPath[token.trackPos];
            targetId = `cell-${coord.x}-${coord.y}`;
        } else if (token.state === 'homeTrack') {
            let coord = homePaths[token.color][token.trackPos];
            targetId = `cell-${coord.x}-${coord.y}`;
        } else if (token.state === 'home') {
            targetId = `base-${token.color}-${token.id.split('-')[1]}`;
        }

        if (targetId) document.getElementById(targetId).appendChild(document.getElementById(`dom-${token.id}`));
    }

    function checkCapture(landingToken) {
        if (landingToken.state !== 'main') return;
        let coord = mainPath[landingToken.trackPos];
        
        if (safeZones.some(s => s.x === coord.x && s.y === coord.y)) return;

        let enemies = gameState.tokens.filter(t => t.color !== landingToken.color && t.state === 'main' && t.trackPos === landingToken.trackPos);
        
        if (enemies.length > 0) {
            playSound('capture');
            enemies.forEach(enemy => {
                enemy.state = 'home';
                enemy.trackPos = -1;
                moveTokenToDOM(enemy); 
            });
            gameState.bonusRoll = true;
        }
    }

    function nextTurn() {
        let prevColor = colors[gameState.turnIndex];
        document.getElementById(`dice-${prevColor}`).classList.remove('visible', 'ready-to-roll');
        document.getElementById(`panel-${prevColor}`).classList.remove('active');
        
        gameState.turnIndex = (gameState.turnIndex + 1) % 4;
        let nextColor = colors[gameState.turnIndex];
        
        document.getElementById(`panel-${nextColor}`).classList.add('active');
        document.getElementById(`dice-${nextColor}`).classList.add('visible', 'ready-to-roll');
        
        gameState.hasRolled = false;
        gameState.currentRoll = 0;
    }

    initGame();

</script>
</body>
</html>
